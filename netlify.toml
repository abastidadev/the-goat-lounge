# Netlify Configuration for The Goat Lounge
# Angular 20+ SPA with Transloco i18n

# Build settings
[build]
  # Command to build the Angular application in production mode
  command = "npm run build"
  
  # Directory that contains the deploy-ready HTML files and assets
  # Must match outputPath in angular.json
  publish = "dist/the-goat-lounge/browser"
  
  # Set Node.js version for build environment
  # Angular 20 requires Node.js 18.19+ or 20.11+
  [build.environment]
    NODE_VERSION = "20"

# SPA redirect rules for Angular routing
# This ensures all routes work correctly with direct access and browser refresh
[[redirects]]
  # Redirect all requests to index.html (SPA handler)
  from = "/*"
  to = "/index.html"
  status = 200
  # Don't force redirect if file exists (allows assets, images, i18n files to load)
  force = false

# Build optimization settings
[build.processing]
  # Skip Netlify's post-processing since Angular CLI already optimizes
  skip_processing = false

# Optional: Branch-specific build settings
# Uncomment to enable different configs for branches
# [context.production]
