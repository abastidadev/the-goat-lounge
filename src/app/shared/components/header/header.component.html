<header [class]="headerClasses()">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20">
    <!-- Desktop Layout: Grid with 3 columns -->
    <div class="hidden lg:grid lg:grid-cols-3 items-center h-full">
      <!-- Left: Logo -->
      <button (click)="navigateToHome()" class="flex items-center gap-3 group justify-self-start cursor-pointer">
        <img
          src="/assets/images/logo-transparent.png"
          alt="The Goat Lounge Logo"
          class="w-12 h-12 object-contain group-hover:scale-110 transition-transform"
        />
        <span class="text-xl font-serif font-bold text-white tracking-wide italic">
          {{ 'general.applicationName' | transloco }}
        </span>
      </button>

      <!-- Center: Navigation -->
      <nav class="flex items-center justify-center gap-8">
        @for (item of navItems(); track item.key) {
          <button
            (click)="handleNavClick(item)"
            [class]="navButtonClasses(item)"
          >
            {{ 'shared.nav.' + item.key | transloco }}
          </button>
        }
      </nav>

      <!-- Right: Language Switcher Dropdown -->
      <div class="flex items-center justify-self-end relative">
        <button
          (click)="toggleLangDropdown()"
          class="flex items-center gap-2 px-2 py-1 bg-black/30 rounded-md hover:bg-black/50 transition-colors"
        >
          <span class="text-gold-400 font-bold text-sm">{{ currentLanguageLabel() }}</span>
          <svg
            class="w-4 h-4 text-gold-400 transition-transform"
            [class.rotate-180]="langDropdownOpen()"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        <!-- Dropdown Menu -->
        @if (langDropdownOpen()) {
          <div class="absolute top-full right-0 mt-2 bg-black/95 backdrop-blur-md rounded-md shadow-lg border border-gold-500/20 min-w-[120px] overflow-hidden">
            @for (lang of availableLanguages; track lang.code) {
              <button
                (click)="selectLanguage(lang.code)"
                class="w-full px-4 py-2 text-left text-sm font-medium transition-colors flex items-center justify-between"
                [class]="isCurrentLanguage(lang.code) ? 'bg-gold-500/20 text-gold-400' : 'text-gray-300 hover:bg-gold-500/10 hover:text-gold-400'"
              >
                <span>{{ 'general.languages.' + lang.code | transloco }}</span>
                @if (isCurrentLanguage(lang.code)) {
                  <svg class="w-4 h-4 text-gold-400" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                  </svg>
                }
              </button>
            }
          </div>
        }
      </div>
    </div>

    <!-- Mobile Layout: Flex -->
    <div class="flex lg:hidden items-center justify-between h-full">
      <!-- Logo -->
      <button (click)="navigateToHome()" class="flex items-center gap-3 group cursor-pointer">
        <img
          src="/assets/images/logo-transparent.png"
          alt="The Goat Lounge Logo"
          class="w-12 h-12 object-contain group-hover:scale-110 transition-transform"
        />
        <span class="text-xl font-serif font-bold text-white tracking-wide italic">
          {{ 'general.applicationName' | transloco }}
        </span>
      </button>

      <!-- Mobile Menu Toggle -->
      <button
        (click)="toggleMobileMenu.emit()"
        class="text-white p-2"
        aria-label="Toggle menu"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          @if (!mobileMenuOpen()) {
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          } @else {
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          }
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (mobileMenuOpen()) {
    <nav class="lg:hidden bg-black/95 backdrop-blur-lg border-t border-gold-500/20">
      <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col gap-2">
        @for (item of navItems(); track item.key) {
          <button
            (click)="handleMobileNavClick(item)"
            [class]="'px-4 py-2 text-left transition-colors rounded-md uppercase text-sm font-medium ' + (currentRoute() === item.key ? 'text-gold-400 bg-gold-500/10 border-l-4 border-gold-500' : 'text-gray-300 hover:text-gold-400 hover:bg-gold-500/10 border-l-4 border-transparent')"
          >
            {{ 'shared.nav.' + item.key | transloco }}
          </button>
        }
        
        <!-- Language Switcher (Mobile) -->
        <div class="relative mt-2">
          <button
            (click)="toggleLangDropdown()"
            class="w-full flex items-center justify-between px-4 py-2 bg-black/30 rounded-md hover:bg-black/50 transition-colors"
          >
            <span class="text-gold-400 font-bold text-sm">{{ currentLanguageLabel() }}</span>
            <svg
              class="w-4 h-4 text-gold-400 transition-transform"
              [class.rotate-180]="langDropdownOpen()"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          @if (langDropdownOpen()) {
            <div class="mt-1 bg-black/95 backdrop-blur-md rounded-md shadow-lg border border-gold-500/20 overflow-hidden">
              @for (lang of availableLanguages; track lang.code) {
                <button
                  (click)="selectLanguage(lang.code)"
                  class="w-full px-4 py-2 text-left text-sm font-medium transition-colors flex items-center justify-between"
                  [class]="isCurrentLanguage(lang.code) ? 'bg-gold-500/20 text-gold-400' : 'text-gray-300 hover:bg-gold-500/10 hover:text-gold-400'"
                >
                  <span>{{ 'general.languages.' + lang.code | transloco }}</span>
                  @if (isCurrentLanguage(lang.code)) {
                    <svg class="w-4 h-4 text-gold-400" fill="currentColor" viewBox="0 0 20 20">
                      <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                  }
                </button>
              }
            </div>
          }
        </div>
      </div>
    </nav>
  }
</header>
