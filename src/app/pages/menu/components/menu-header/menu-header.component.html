<!-- Menu Header (Title + Tabs) -->
<div class="bg-black/95 backdrop-blur-lg border-b border-gold-500/20">
  <div class="max-w-7xl mx-auto px-4 py-8">
    <!-- Title -->
    <div class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-serif font-bold text-white italic">
        {{ 'pages.menu.title' | transloco }}
      </h1>
      <p class="text-gray-400 text-lg mt-2">
        {{ 'pages.menu.subtitle' | transloco }}
      </p>
      <div class="w-24 h-1 bg-gold-500 mx-auto mt-4 rounded-md"></div>
    </div>

    <!-- Category Tabs -->
    <nav class="flex flex-wrap justify-center gap-2 md:gap-4">
      @for (tab of tabs; track tab.id) {
        <button
          (click)="onTabClick(tab.id)"
          [class]="tabClasses()(tab.id)"
        >
          <span class="text-2xl mr-2">{{ tab.icon }}</span>
          {{ tab.labelKey | transloco }}
        </button>
      }
    </nav>
  </div>
</div>
