<section
  id="home"
  class="relative min-h-screen flex items-center justify-center bg-gradient-to-b from-black via-gray-900 to-black overflow-hidden"
>
  <!-- Background Image with Overlay -->
  <div class="absolute inset-0">
    <img
      src="/assets/images/interior.webp"
      alt="The Goat Lounge Interior"
      class="w-full h-full object-cover opacity-50"
      loading="eager"
      fetchpriority="high"
      decoding="async"
    />
    <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/50 to-black"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 text-center max-w-5xl mx-auto px-4 py-32">
    <!-- Eyebrow Text -->
    <p
      class="text-gold-400 text-sm md:text-base font-medium tracking-[0.3em] uppercase mb-8 animate-pulse"
    >
      {{ 'pages.home.hero.eyebrow' | transloco }}
    </p>

    <!-- Main Title -->
    <h1
      class="text-6xl md:text-8xl lg:text-9xl font-serif font-bold text-white mb-6 tracking-tight italic leading-none"
    >
      {{ 'pages.home.hero.title' | transloco }}
    </h1>

    <!-- Subtitle -->
    <p class="text-lg md:text-xl lg:text-2xl text-gray-300 mb-12 max-w-3xl mx-auto leading-relaxed">
      {{ 'pages.home.hero.subtitle' | transloco }}
    </p>

    <!-- CTA Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
      <button
        (click)="navigateToContact()"
        class="px-8 py-4 bg-gold-500 hover:bg-gold-600 border-2 border-gold-500 hover:border-gold-600 text-black font-bold text-base tracking-wide uppercase rounded-md transition-all duration-300 hover:scale-105 hover:shadow-lg hover:shadow-gold-500/30"
      >
        {{ 'pages.home.hero.cta' | transloco }}
      </button>
      <button
        (click)="navigateToMenu()"
        class="px-8 py-4 bg-transparent hover:bg-gold-500 border-2 border-gold-500 hover:border-gold-600 text-gold-400 hover:text-black font-bold text-base tracking-wide uppercase rounded-md transition-all duration-300 hover:scale-105 hover:shadow-lg hover:shadow-gold-500/30"
      >
        {{ 'pages.home.hero.ctaSecondary' | transloco }}
      </button>
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="absolute bottom-12 inset-x-0 flex justify-center animate-bounce z-10">
    <svg class="w-8 h-8 text-gold-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 14l-7 7m0 0l-7-7m7 7V3"
      />
    </svg>
  </div>
</section>
